name: Build executables

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: bd1-linux-x86_64
            pyinstaller_hidden_imports: >-
              --hidden-import pystray._appindicator
              --hidden-import pystray._gtk
              --hidden-import pystray._xorg
              --hidden-import pynput.keyboard._xorg
              --hidden-import pynput.mouse._xorg
          - os: windows-latest
            artifact_name: bd1-windows-x86_64
            pyinstaller_hidden_imports: >-
              --hidden-import pystray._win32
              --hidden-import pynput.keyboard._win32
              --hidden-import pynput.mouse._win32
          - os: macos-latest
            artifact_name: bd1-macos-arm64
            pyinstaller_hidden_imports: >-
              --hidden-import pystray._darwin
              --hidden-import pynput.keyboard._darwin
              --hidden-import pynput.mouse._darwin

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Linux build libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libx11-dev libxtst-dev libxi-dev

      - name: Install Python dependencies
        run: python -m pip install -U pip && python -m pip install ".[desktop,build,dev]"

      - name: Run checks
        env:
          PYSTRAY_BACKEND: dummy
        run: |
          ruff check .
          ruff format --check .
          python -m unittest discover -s tests -v

      - name: Build with PyInstaller
        if: runner.os != 'macOS'
        shell: bash
        env:
          PYSTRAY_BACKEND: dummy
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name BD-1 \
            --collect-data bd1 \
            --collect-data holidays \
            ${{ matrix.pyinstaller_hidden_imports }} \
            scripts/bd1_entry.py

      - name: Build macOS application with PyInstaller
        if: runner.os == 'macOS'
        shell: bash
        env:
          PYSTRAY_BACKEND: dummy
        run: python -m PyInstaller --noconfirm --clean scripts/bd1_macos.spec

      - name: Include OSS notices in application bundle
        if: runner.os == 'Linux' || runner.os == 'Windows'
        shell: bash
        run: cp LICENSE NOTICE THIRD_PARTY_LICENSES.md dist/BD-1/

      - name: Verify macOS application metadata
        if: runner.os == 'macOS'
        shell: bash
        run: |
          test "$(plutil -extract LSUIElement raw dist/BD-1.app/Contents/Info.plist)" = "true"
          test "$(plutil -extract CFBundleIdentifier raw dist/BD-1.app/Contents/Info.plist)" = "com.bd1.app"
          icon_file="$(plutil -extract CFBundleIconFile raw dist/BD-1.app/Contents/Info.plist)"
          test -f "dist/BD-1.app/Contents/Resources/${icon_file}"
          test -f dist/BD-1.app/Contents/Resources/LICENSE
          test -f dist/BD-1.app/Contents/Resources/NOTICE
          test -f dist/BD-1.app/Contents/Resources/THIRD_PARTY_LICENSES.md
          codesign --verify --deep --strict dist/BD-1.app

      - name: Package Linux bundle
        if: runner.os == 'Linux'
        shell: bash
        run: tar -C dist -czf "${{ matrix.artifact_name }}.tar.gz" BD-1

      - name: Package macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: ditto -c -k --sequesterRsrc --keepParent "dist/BD-1.app" "${{ matrix.artifact_name }}.zip"

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Package Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: iscc scripts/windows-installer.iss

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.tar.gz
          if-no-files-found: error

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          if-no-files-found: error

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.exe
          if-no-files-found: error

  release:
    name: Publish branch release
    if: github.event_name == 'push' && github.ref_type == 'branch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bd1-*
          path: release-artifacts
          merge-multiple: true

      - name: Define branch release metadata
        id: release
        shell: bash
        run: |
          echo "tag=build/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "title=Latest build: ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Update branch release tag
        env:
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate --force "$TAG" "$GITHUB_SHA" --message "Automated build for ${GITHUB_REF_NAME}"
          git push origin "refs/tags/$TAG" --force

      - name: Publish branch release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.title }}
          prerelease: true
          target_commitish: ${{ github.sha }}
          body: Automated installable builds for the latest successful push to `${{ github.ref_name }}`.
          files: release-artifacts/*
          fail_on_unmatched_files: true
          overwrite_files: true
